# Included from inside an existing `server { }` block via:
#   include /etc/nginx/default.d/*.conf;
# (Amazon Linux / RHEL family). Do NOT wrap this in `server { }` again --
# nginx will error: "server" directive is not allowed here.

location /file1 {
    default_type text/html;
    alias /var/www/html/index1.html;
}

location /file2 {
    default_type text/html;
    alias /var/www/html/index2.html;
}

location /file3 {
    default_type text/html;
    alias /var/www/html/index3.html;
}
