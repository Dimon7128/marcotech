# Included by Amazon Linux nginx inside an EXISTING server { } block via:
#   include /etc/nginx/default.d/*.conf;
#
# Do NOT wrap this in another "server { }" — that causes:
#   nginx: [emerg] "server" directive is not allowed here

default_type text/html;

location = /file1 {
    alias /var/www/html/index1.html;
}

location = /file2 {
    alias /var/www/html/index2.html;
}

location = /file3 {
    alias /var/www/html/index3.html;
}
