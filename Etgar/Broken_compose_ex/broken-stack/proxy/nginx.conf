worker_processes  1;

events {
    worker_connections  1024;
}

http {
    sendfile        on;
    keepalive_timeout  65;

    upstream motd_app {
        # >>> INTENTIONAL BUG #3: wrong port.
        # The Flask app listens on port 5000 (see web/app.py and Dockerfile),
        # but this upstream points to 8000. Once the app is reachable, nginx
        # will still answer 502 Bad Gateway because *this* connection fails.
        # Look in the proxy's logs for:
        #   connect() failed (111: Connection refused) while connecting to upstream
        server web:8000;
    }

    server {
        listen 80;
        server_name _;

        location /healthz {
            proxy_pass http://motd_app/healthz;
        }

        location / {
            proxy_pass http://motd_app/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }
    }
}
