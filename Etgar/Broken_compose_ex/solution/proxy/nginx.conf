worker_processes  1;

events {
    worker_connections  1024;
}

http {
    sendfile        on;
    keepalive_timeout  65;

    upstream motd_app {
        # FIX #3: the Flask app listens on port 5000 (see web/app.py).
        # The broken version pointed at 8000 and produced 502 Bad Gateway.
        server web:5000;
    }

    server {
        listen 80;
        server_name _;

        location /healthz {
            proxy_pass http://motd_app/healthz;
        }

        location / {
            proxy_pass http://motd_app/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }
    }
}
